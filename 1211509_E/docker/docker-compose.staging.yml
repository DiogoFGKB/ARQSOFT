version: "3.9"

services:
  postgres:
    image: postgres:latest
    container_name: postgres_staging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    expose:
      - "5432"
    volumes:
      - postgres_staging_volume:/var/lib/postgresql
      - ./init-staging-db.sql:/docker-entrypoint-initdb.d/init-staging-db.sql
    networks:
      - lms_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_staging
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    expose:
      - "5672"
      - "15672"
    networks:
      - lms_network

  books:
    build:
      context: ../books
      dockerfile: ../books/Dockerfile
    container_name: books_staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/books_staging
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
    expose:
      - "8080"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - lms_network

  users:
    build:
      context: ../users
      dockerfile: ../users/Dockerfile
    container_name: users_staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_staging
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
    expose:
      - "8080"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - lms_network

  readers:
    build:
      context: ../readers
      dockerfile: ../readers/Dockerfile
    container_name: readers_staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/readers_staging
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
    expose:
      - "8080"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - lms_network

  lendings:
    build:
      context: ../lendings
      dockerfile: ../lendings/Dockerfile
    container_name: lendings_staging
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lendings_staging
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
    expose:
      - "8080"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - lms_network

  nginx:
    image: nginx
    container_name: nginx_staging
    ports:
      - "8080:80"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf
    depends_on:
      - books
      - users
      - readers
      - lendings
    networks:
      - lms_network

networks:
  lms_network:
    name: lms_network

volumes:
  postgres_staging_volume:
